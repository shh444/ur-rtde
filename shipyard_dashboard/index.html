<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>조선소 용접 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  html, body, #root { height: 100%; margin: 0; padding: 0; }
  body {
    background: #0a0f1c;
    color: #e5e7eb;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
  }
  * { box-sizing: border-box; }
  input, select, textarea, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #1f2a3a; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data + shared atoms -->
<script src="data.js"></script>
<script src="data-modbus.js"></script>
<script type="text/babel" src="shared.jsx"></script>

<!-- Tweaks shell -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Analysis variant — provides helper components used by Screen Analysis -->
<script type="text/babel" src="variant-standard.jsx"></script>

<!-- Screens + shell -->
<script type="text/babel" src="screen-monitoring.jsx"></script>
<script type="text/babel" src="screen-rtde.jsx"></script>
<script type="text/babel" src="screen-recordings.jsx"></script>
<script type="text/babel" src="screen-analysis.jsx"></script>
<script type="text/babel" src="screen-mapping.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>

<script type="text/babel">

const TWEAKS = /*EDITMODE-BEGIN*/{
  "accentColor": "#ff6b35",
  "density": "comfortable",
  "showSparklines": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS);

  React.useEffect(() => {
    window.TOKENS.accent = tweaks.accentColor;
    window.TOKENS.serieses = [
      tweaks.accentColor, '#22d3ee', '#fbbf24', '#34d399',
      '#a78bfa', '#f472b6', '#60a5fa', '#fb7185',
    ];
  }, [tweaks.accentColor]);

  return (
    <>
      <AppShell key={tweaks.accentColor} />
      <TweaksPanel title="Tweaks">
        <TweakSection title="외관">
          <TweakColor
            label="액센트 색상"
            value={tweaks.accentColor}
            onChange={(v) => setTweak('accentColor', v)}
            options={['#ff6b35', '#22d3ee', '#fbbf24', '#a78bfa', '#34d399']}
          />
          <TweakSelect
            label="밀도"
            value={tweaks.density}
            onChange={(v) => setTweak('density', v)}
            options={[
              { value: 'comfortable', label: '여유' },
              { value: 'compact', label: '조밀' },
            ]}
          />
          <TweakToggle
            label="스파크라인 표시"
            value={tweaks.showSparklines}
            onChange={(v) => setTweak('showSparklines', v)}
          />
        </TweakSection>
        <TweakSection title="참고">
          <div style={{
            fontSize: 11, color: '#6b7280', lineHeight: 1.6,
            padding: '4px 0',
          }}>
            시안 비교 페이지(<a href="Variants Canvas.html" style={{ color: '#ff6b35' }}>Variants Canvas.html</a>)는 별도 파일에 보존되어 있습니다.
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
